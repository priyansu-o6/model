version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MILVUS_HOST=${MILVUS_HOST}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - USE_MOCK_MODELS=${USE_MOCK_MODELS}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    depends_on:
      - db
      - redis
      - milvus
      - minio
      - n8n
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache/huggingface

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app.app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MILVUS_HOST=${MILVUS_HOST}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - USE_MOCK_MODELS=${USE_MOCK_MODELS}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    depends_on:
      - backend
      - redis
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache/huggingface

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=pratyaksha
      - POSTGRES_PASSWORD=pratyaksha
      - POSTGRES_DB=pratyaksha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    environment:
      - ETCD_USE_EMBED=true
      - MINIO_USE_EMBED=true
      - COMMON_STANDALONE=true
    ports:
      - "19530:19530"
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  hf_cache:

